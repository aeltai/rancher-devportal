name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Image/chart version tag (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/aeltai/rancher-devportal-backend
  OPERATOR_IMAGE: ghcr.io/aeltai/rancher-devportal-operator

jobs:
  build-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.ver.outputs.tag }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push operator
        uses: docker/build-push-action@v6
        with:
          context: ./operator
          push: true
          tags: |
            ${{ env.OPERATOR_IMAGE }}:${{ steps.ver.outputs.tag }}
            ${{ env.OPERATOR_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: build-images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "semver=${TAG#v}" >> "$GITHUB_OUTPUT"

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Package Helm charts
        run: |
          helm package helm/devportal --version "${{ steps.ver.outputs.semver }}" --app-version "${{ steps.ver.outputs.semver }}"
          helm package helm/operator --version "${{ steps.ver.outputs.semver }}" --app-version "${{ steps.ver.outputs.semver }}"
          cd helm/geeko-ops && helm dependency update && cd ../..
          helm package helm/geeko-ops --version "${{ steps.ver.outputs.semver }}" --app-version "${{ steps.ver.outputs.semver }}"
          ls -la *.tgz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Geeko-Ops ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            devportal-${{ steps.ver.outputs.semver }}.tgz
            operator-${{ steps.ver.outputs.semver }}.tgz
            geeko-ops-${{ steps.ver.outputs.semver }}.tgz
          body: |
            ## Geeko-Ops ${{ steps.ver.outputs.tag }}

            ### Container images
            - `${{ env.BACKEND_IMAGE }}:${{ steps.ver.outputs.tag }}`
            - `${{ env.OPERATOR_IMAGE }}:${{ steps.ver.outputs.tag }}`

            ### Helm install (full stack)
            ```bash
            helm upgrade --install geeko-ops ./geeko-ops-${{ steps.ver.outputs.semver }}.tgz \
              --namespace devportal-system --create-namespace \
              --set devportal.rancher.token="token-xxx:yyyy" \
              --set devportal.rancher.publicHost="rancher.example.com" \
              --set devportal.uiPlugin.endpoint="https://aeltai.github.io/rancher-devportal/extensions/devportal/0.1.0/plugin" \
              --set devportal.image.tag=${{ steps.ver.outputs.tag }} \
              --set operator.image.tag=${{ steps.ver.outputs.tag }}
            ```

            CRDs ship with the `devportal` chart (`crds/`). On upgrade, apply CRD changes manually if needed.
