apiVersion: v1
kind: ServiceAccount
metadata:
  name: platform-operator
  namespace: devportal-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: platform-operator
rules:
  - apiGroups: [""]
    resources: ["namespaces", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["platform.devportal.io"]
    resources: ["platformrequests"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["platform.devportal.io"]
    resources: ["platformrequests/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["fleet.cattle.io"]
    resources: ["gitrepos"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: platform-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: platform-operator
subjects:
  - kind: ServiceAccount
    name: platform-operator
    namespace: devportal-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-operator
  namespace: devportal-system
  labels:
    app: platform-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform-operator
  template:
    metadata:
      labels:
        app: platform-operator
    spec:
      serviceAccountName: platform-operator
      containers:
        - name: operator
          image: platform-operator:local
          imagePullPolicy: IfNotPresent
          env:
            - name: PLATFORM_NAMESPACE
              value: devportal-system
            - name: PLATFORM_FLEET_NAMESPACE
              value: fleet-default
            - name: PLATFORM_GIT_BRANCH
              value: main
            - name: PLATFORM_GIT_SECRET
              value: platform-git-credentials
            - name: RECONCILE_INTERVAL
              value: 15s
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
