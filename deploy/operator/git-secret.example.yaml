# Example Git credentials for the platform operator (HTTPS push).
# Replace token with a PAT or deploy-key secret before use.
#
# kubectl apply -f deploy/operator/git-secret.example.yaml
# kubectl create secret generic platform-git-credentials -n devportal-system \
#   --from-literal=username=git --from-literal=token=ghp_xxx --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: platform-git-credentials
  namespace: devportal-system
type: Opaque
stringData:
  username: git
  token: "REPLACE_WITH_GITHUB_PAT"
