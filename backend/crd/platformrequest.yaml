apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: platformrequests.platform.devportal.io
spec:
  group: platform.devportal.io
  names:
    kind: PlatformRequest
    listKind: PlatformRequestList
    plural: platformrequests
    singular: platformrequest
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                name:
                  type: string
                displayName:
                  type: string
                description:
                  type: string
                template:
                  type: string
                charts:
                  type: array
                  items:
                    type: string
                requester:
                  type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                message:
                  type: string
      additionalPrinterColumns:
        - name: Template
          type: string
          jsonPath: .spec.template
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Requester
          type: string
          jsonPath: .spec.requester
