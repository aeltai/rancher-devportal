apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: platformrequests.platform.devportal.io
spec:
  group: platform.devportal.io
  names:
    kind: PlatformRequest
    listKind: PlatformRequestList
    plural: platformrequests
    singular: platformrequest
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  description: Environment slug (env-{name} namespace)
                displayName:
                  type: string
                description:
                  type: string
                template:
                  type: string
                  description: Environment profile id (defined in platform-config)
                offeringId:
                  type: string
                collectionId:
                  type: string
                cloneFromRef:
                  type: object
                  properties:
                    clusterId:
                      type: string
                    clusterName:
                      type: string
                    namespace:
                      type: string
                    projectId:
                      type: string
                    projectName:
                      type: string
                formValues:
                  type: object
                  additionalProperties:
                    type: string
                charts:
                  type: array
                  items:
                    type: string
                customResources:
                  type: array
                  description: Custom CR manifests to push to Git (operator CRDs, etc.)
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                      apiVersion:
                        type: string
                      kind:
                        type: string
                      name:
                        type: string
                      namespace:
                        type: string
                      specYaml:
                        type: string
                      manifestYaml:
                        type: string
                requester:
                  type: string
                gitRepo:
                  type: string
                  description: Git repository URL for Fleet manifests (HTTPS)
                gitBranch:
                  type: string
                  description: Branch to push manifests to
                gitPath:
                  type: string
                  description: Path prefix inside repo (default environments/{name})
                gitSecretName:
                  type: string
                  description: Secret in CR namespace with username/password or token for Git push
                targetClusters:
                  type: array
                  items:
                    type: string
                  description: Fleet target cluster names (empty = all clusters)
            status:
              type: object
              properties:
                phase:
                  type: string
                message:
                  type: string
                gitCommit:
                  type: string
                fleetGitRepoName:
                  type: string
                namespaceName:
                  type: string
                approvedBy:
                  type: string
                  description: Rancher username who approved the request
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
      additionalPrinterColumns:
        - name: Template
          type: string
          jsonPath: .spec.template
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Requester
          type: string
          jsonPath: .spec.requester
        - name: GitRepo
          type: string
          jsonPath: .spec.gitRepo
