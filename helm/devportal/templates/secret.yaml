{{- if not .Values.rancher.existingSecret.name }}
{{- if .Values.rancher.token }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "devportal.fullname" . }}-rancher
  labels:
    {{- include "devportal.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ .Values.rancher.token | quote }}
  {{- if .Values.rancher.publicHost }}
  publicHost: {{ .Values.rancher.publicHost | quote }}
  {{- end }}
{{- else }}
# No token - create empty secret (UI passes token per-request)
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "devportal.fullname" . }}-rancher
  labels:
    {{- include "devportal.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: ""
  {{- if .Values.rancher.publicHost }}
  publicHost: {{ .Values.rancher.publicHost | quote }}
  {{- end }}
{{- end }}
{{- end }}
