{{- if .Values.platformConfig.create }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.platformConfig.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "devportal.labels" . | nindent 4 }}
    app.kubernetes.io/component: platform-config
data:
  platform.yaml: |
{{- if .Values.platformConfig.existingContent }}
{{ .Values.platformConfig.existingContent | indent 4 }}
{{- else }}
{{ .Files.Get "files/platform.yaml" | indent 4 }}
{{- end }}
{{- end }}
