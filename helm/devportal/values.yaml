# Default values for rancher-devportal
# Deploys devportal-backend + UI extension for Rancher Dashboard

replicaCount: 1

catalog:
  createClusterRepo: false
  name: rancher-devportal
  url: ""
  gitRepo: "https://github.com/aeltai/rancher-devportal"
  gitBranch: main
  refreshInterval: 0

# Bootstrap Job - creates ClusterRepo on install (adds extension catalog)
bootstrap:
  enabled: false  # Set true to auto-register catalog on install
  image:
    repository: bitnami/kubectl
    tag: "latest"

# UI extension - loads the Developer Portal UI in Rancher Dashboard
uiPlugin:
  enabled: true
  # Must match extension plugin/package.json "name" so Rancher shows it in sidebar
  pluginName: devportal
  # Rancher expects extensions in cattle-ui-plugin-system (not Release.Namespace)
  namespace: cattle-ui-plugin-system
  version: "0.1.0"
  # URL to extension JS bundle (must be built and published)
  # e.g. https://raw.githubusercontent.com/aeltai/ui-plugin-examples/main/extensions/krew-plugin-manager/0.1.0
  endpoint: "https://aeltai.github.io/rancher-devportal/extensions/devportal/0.1.0/plugin"
  noCache: false
  noAuth: false
  metadata:
    catalog.cattle.io/display-name: Developer Portal
    catalog.cattle.io/kube-version: ">= 1.16.0-0"
    catalog.cattle.io/rancher-version: ">= 2.10.0-0"
    catalog.cattle.io/ui-extensions-version: ">= 3.0.0 < 4.0.0"

image:
  repository: ghcr.io/aeltai/rancher-devportal
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 0

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: devportal.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80  # used when autoscaling.enabled=true

# Rancher connection - backend fetches kubeconfig from Rancher API
rancher:
  url: "https://rancher.cattle-system.svc"
  # Host users use in browser (no https://). Required for kubeconfig sync.
  publicHost: ""  # e.g. rancher.35.157.202.39.sslip.io
  token: ""
  # Use existing secret instead of chart-created one (recommended)
  existingSecret:
    name: ""       # e.g. devportal-rancher
    tokenKey: token
    publicHostKey: publicHost

# Persistent volume for krew plugins (survives pod restarts)
persistence:
  enabled: true
  storageClass: ""
  size: 1Gi


nodeSelector: {}

tolerations: []

affinity: {}
